<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GeoClash | Precision Reconnaissance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@300;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-dim": "#00cdec",
                    "on-background": "#ffffff",
                    "secondary": "#dee4e3",
                    "surface-container-lowest": "#000000",
                    "on-tertiary-fixed": "#00343d",
                    "tertiary": "#7ae6ff",
                    "on-primary-fixed-variant": "#006632",
                    "surface-container-highest": "#232626",
                    "on-secondary-fixed-variant": "#565d5c",
                    "on-tertiary": "#005360",
                    "surface-container": "#181a1a",
                    "on-secondary": "#4d5353",
                    "surface-container-high": "#1d2020",
                    "error-dim": "#d7383b",
                    "on-tertiary-container": "#004955",
                    "tertiary-fixed-dim": "#00cdec",
                    "secondary-dim": "#d0d6d5",
                    "on-surface-variant": "#aaabab",
                    "outline": "#747675",
                    "inverse-primary": "#006e37",
                    "on-secondary-container": "#ccd1d1",
                    "surface-container-low": "#121414",
                    "inverse-surface": "#f9f9f9",
                    "secondary-container": "#424848",
                    "error": "#ff716c",
                    "on-primary-fixed": "#004621",
                    "error-container": "#9f0519",
                    "surface-dim": "#0d0f0f",
                    "surface-bright": "#2a2d2d",
                    "on-surface": "#ffffff",
                    "on-secondary-fixed": "#3a4040",
                    "tertiary-fixed": "#00dcfd",
                    "primary-fixed-dim": "#00ed7e",
                    "primary-dim": "#00ed7e",
                    "secondary-fixed": "#dee4e3",
                    "primary-container": "#00fd87",
                    "primary": "#a4ffb9",
                    "outline-variant": "#474848",
                    "tertiary-container": "#00dcfd",
                    "on-primary": "#006532",
                    "surface-variant": "#232626",
                    "on-primary-container": "#005b2c",
                    "surface-tint": "#a4ffb9",
                    "on-error-container": "#ffa8a3",
                    "background": "#0d0f0f",
                    "surface": "#0d0f0f",
                    "secondary-fixed-dim": "#d0d6d5",
                    "primary-fixed": "#00fd87",
                    "on-tertiary-fixed-variant": "#005361",
                    "inverse-on-surface": "#545555",
                    "on-error": "#490006"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #0d0f0f; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card { backdrop-filter: blur(20px); background-color: rgba(35, 38, 38, 0.4); border-top: 1px solid rgba(170, 171, 171, 0.2); border-left: 1px solid rgba(170, 171, 171, 0.2); }
        .glow-primary { box-shadow: 0 0 20px rgba(164, 255, 185, 0.2); }
        .topo-overlay { background-image: radial-gradient(#a4ffb9 0.5px, transparent 0.5px); background-size: 24px 24px; opacity: 0.05; }
    </style>
</head>
<body class="text-on-background bg-surface min-h-screen overflow-x-hidden selection:bg-primary selection:text-on-primary">
<!-- TopNavBar Shell -->
<header class="fixed top-0 w-full z-50 bg-[#0d0f0f] border-b border-[#a4ffb9]/15 shadow-[0_0_20px_rgba(164,255,185,0.05)]">
<nav class="flex justify-between items-center px-6 py-4 max-w-[1440px] mx-auto font-['Space_Grotesk'] tracking-tight">
<div class="flex items-center gap-8">
<span class="text-2xl font-bold tracking-tighter text-[#a4ffb9] uppercase">GeoClash</span>
<div class="hidden md:flex gap-6 items-center">
<a class="text-[#a4ffb9] border-b-2 border-[#a4ffb9] text-sm font-medium" href="#">Explore</a>
</div>
</div>
<div class="flex items-center gap-4">
<div class="flex gap-2 mr-4">
<span class="material-symbols-outlined text-[#a4ffb9] cursor-pointer hover:opacity-80">language</span>
<span class="material-symbols-outlined text-[#a4ffb9] cursor-pointer hover:opacity-80">public</span>
</div>
<button class="px-4 py-2 text-slate-400 text-sm font-medium hover:bg-[#a4ffb9]/10 transition-all duration-300 rounded active:scale-95 duration-150">Login</button>
<button class="px-5 py-2 bg-[#a4ffb9] text-[#006532] font-bold text-sm rounded shadow-lg hover:shadow-[#a4ffb9]/20 transition-all duration-300 active:scale-95 duration-150">Sign Up</button>
</div>
</nav>
</header>
<main class="relative pt-24">
<!-- Hero Section -->
<section class="relative min-h-[calc(100vh-96px)] flex items-center justify-center overflow-hidden px-6">
<!-- Background Elements -->
<div class="absolute inset-0 topo-overlay pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="relative z-10 max-w-4xl w-full text-center">
<!-- Eyebrow -->
<div class="inline-flex items-center gap-2 px-3 py-1 bg-surface-container-high rounded-full border border-outline-variant/30 mb-8">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-[10px] font-bold tracking-[0.2em] uppercase text-primary">Live Multiplayer Recon</span>
</div>
<!-- Game Title -->
<h1 class="font-headline text-7xl md:text-9xl font-extrabold tracking-tighter mb-6 text-white leading-none">
                    GEO<span class="text-primary">CLASH</span>
</h1>
<!-- Description -->
<p class="font-body text-lg md:text-xl text-on-surface-variant max-w-2xl mx-auto mb-10 leading-relaxed">
                    Precision Navigation &amp; Global Reconnaissance. Challenge your perception in the ultimate multiplayer geospatial hunt.
                </p>
<!-- CTA -->
<div class="flex flex-col sm:flex-row items-center justify-center gap-6">
<button class="group relative px-10 py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-lg shadow-[0_0_30px_rgba(164,255,185,0.3)] transition-all duration-500 hover:scale-105 hover:shadow-[0_0_50px_rgba(164,255,185,0.5)] active:scale-95 overflow-hidden">
<span class="relative z-10 uppercase tracking-widest">Play Now</span>
<div class="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"></div>
</button>
<button class="px-8 py-5 text-on-surface font-headline font-bold text-lg border border-outline-variant/30 hover:border-primary/50 transition-colors rounded-lg glass-card">
                        Tutorial
                    </button>
</div>
</div>
<!-- Absolute Decorative Coordinate Elements -->
<div class="absolute bottom-12 left-12 font-headline text-[10px] tracking-[0.3em] text-on-surface-variant/40 hidden lg:block">
                LAT 48.8584° N <br/> LON 2.2945° E
            </div>
<div class="absolute bottom-12 right-12 font-headline text-[10px] tracking-[0.3em] text-on-surface-variant/40 hidden lg:block text-right">
                ALT 35,000 FT <br/> PRECISION 0.001M
            </div>
</section>
</main>
</body></html>
