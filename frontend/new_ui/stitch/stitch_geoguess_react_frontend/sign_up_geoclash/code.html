<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | GeoClash</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-background": "#ffffff",
                        "primary-fixed": "#00fd87",
                        "on-secondary-fixed": "#3a4040",

                        "inverse-primary": "#006e37",

                        "tertiary-container": "#00dcfd",

                        "error": "#ff716c",
                        "tertiary-fixed": "#00dcfd",
                        "secondary-fixed-dim": "#d0d6d5",
                        "surface-container-high": "#1d2020",
                        "secondary": "#dee4e3",

                        "on-tertiary": "#005360",
                        "surface-tint": "#a4ffb9",
                        "on-secondary-fixed-variant": "#565d5c",
                        "primary-dim": "#00ed7e",

                        "on-tertiary-fixed-variant": "#005361",
                        "on-primary-fixed-variant": "#006632",

                    "borderRadius": {

<style>.glass-card {
    background: rgba(35, 38, 38, 0.4);
    backdrop-filter: blur(24px);
    border-top: 1px solid rgba(170, 171, 171, 0.2);
    border-left: 1px solid rgba(170, 171, 171, 0.2)
    }
.map-background {
    background-image: linear-gradient(rgba(13, 15, 15, 0.85), rgba(13, 15, 15, 0.85)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuC0dvmRwwTkfsybiYPqw9CLtHZxjg6d1qPOojsVTAIbSTLK3t7DFfMC9sw1-zUAwTRnHmLCFQvfyWCNrj8ElDzA1dB__frramVP2kTXH3ncHQXFXMt44zDIv736HOFJzNdjZE0XtPHA-TZfe0S0QkT8N4KBNE4DZuRmVaxVlF_ymfBOVEuFVBYkL4DX38lfAtCjAnQpLzgZszczfcuwzZCD1rya4Fg7FrRpOUzeezasOvV9KoM9iTNgRc6cYhcOucHXJLUwVz5GiNs);
    background-size: cover;
    background-position: center
    }
.btn-glow:hover {
    box-shadow: 0 0 20px rgba(164, 255, 185, 0.4)
    }</style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary selection:text-on-primary">
<div class="min-h-screen w-full map-background flex items-center justify-center p-6" data-alt="Dark satellite view of world map at night with glowing city lights and atmospheric deep teal and obsidian tones">
<!-- Main Container -->
<main class="w-full max-w-lg">
<!-- Glassy Form Card -->
<div class="glass-card rounded-xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
<!-- Atmospheric glow behind card -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 blur-[100px] rounded-full"></div>
<!-- Branding -->
<div class="text-center mb-10 relative z-10">
<h1 class="font-headline text-4xl font-bold tracking-tighter text-primary drop-shadow-[0_0_12px_rgba(164,255,185,0.3)] uppercase">
                        GeoClash
                    </h1>
<p class="text-on-surface-variant font-label text-sm mt-2 tracking-widest uppercase">Global Territory Conquest</p>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-6 relative z-10" method="POST">
<div class="space-y-4">
<!-- Full Name -->
<div class="group">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors duration-300" for="fullname">
                                Full Name
                            </label>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 px-5 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary transition-all duration-300 outline-none" id="fullname" name="fullname" placeholder="Commander Name" required="" type="text"/>
</div>
<!-- Grid for Username & Email -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="group">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors duration-300" for="username">
                                    Username
                                </label>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 px-5 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary transition-all duration-300 outline-none" id="username" name="username" placeholder="ghost_explorer" required="" type="text"/>
</div>
<div class="group">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors duration-300" for="email">
                                    Email Address
                                </label>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 px-5 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary transition-all duration-300 outline-none" id="email" name="email" placeholder="sat@geoclash.io" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="group">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors duration-300" for="password">
                                Password
                            </label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 px-5 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary transition-all duration-300 outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline cursor-pointer hover:text-on-surface transition-colors">visibility</span>
</div>
</div>
<!-- Confirm Password -->
<div class="group">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors duration-300" for="confirm_password">
                                Confirm Password
                            </label>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 px-5 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary transition-all duration-300 outline-none" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-center space-x-3 pt-2">
<input class="w-4 h-4 rounded bg-surface-container-highest border-outline-variant text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="text-xs text-on-surface-variant" for="terms">
                            I agree to the <a class="text-primary hover:underline underline-offset-4" href="#">Rules of Engagement</a> and Privacy Protocol.
                        </label>
</div>
<!-- CTA -->
<button class="btn-glow w-full bg-gradient-to-br from-primary to-primary-container py-5 rounded-lg font-headline font-bold text-on-primary-container text-lg tracking-tight hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center group" type="submit">
                        CREATE ACCOUNT
                        <span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center relative z-10">
<p class="text-on-surface-variant text-sm">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline underline-offset-4 ml-1" href="#">Login</a>
</p>
</div>
</div>
<!-- Footer Metadata -->
<div class="mt-8 flex justify-between items-center px-4 opacity-50">
<div class="flex items-center space-x-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-[10px] font-label uppercase tracking-widest">Server Status: Online</span>
</div>
<span class="text-[10px] font-label uppercase tracking-widest">v2.4.0-Stable</span>
</div>
</main>
</div>
</body></html>
