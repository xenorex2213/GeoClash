<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GeoClash - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "primary-fixed": "#00fd87",
                        "on-secondary-fixed": "#3a4040",
                        "outline-variant": "#474848",
                        "secondary-container": "#424848",
                        "primary-fixed-dim": "#00ed7e",
                        "on-primary": "#006532",

                    "borderRadius": {

<style>.glass-card {
    background: rgba(35, 38, 38, 0.4);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(170, 171, 171, 0.2);
    border-left: 1px solid rgba(170, 171, 171, 0.2)
    }
.kinetic-glow {
    box-shadow: 0 0 20px rgba(164, 255, 185, 0.2)
    }
.kinetic-glow:hover {
    box-shadow: 0 0 30px rgba(164, 255, 185, 0.5)
    }
.map-bg {
    background-image: linear-gradient(to bottom, rgba(13, 15, 15, 0.8), rgba(13, 15, 15, 0.95)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuA8EbxgLR6pICE_BFOCmu955K1p8Wtfl7JqtEiscvfQU-aGaW5R_fKwKpe2RjBImhnGeqHwKcKHMdBat4cLhPjGEgmyZWn4mjkZoYh-QffzzCZuc5NMPRTmnClI697zOCHtchwYuOwnxh1k8UpIsRNFB6RTULQnxhql8fw4GFu5gv2xNBC9EPCByy1F-HC79_5OhjTuUI1K6ib2CTU67Fyt1eQ8vO07SI6_bjiyprQG1aCNakpbyRbKBsPo9CVtdzR21qasWQTORgg);
    background-size: cover;
    background-position: center
    }</style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center p-6 map-bg" data-location="World">
<!-- Subtle atmospheric glow behind the card -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-surface-tint opacity-[0.03] blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-[480px] z-10">
<div class="glass-card rounded-xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-10">
<div class="mb-2">
<span class="text-4xl font-headline font-bold tracking-tighter text-primary drop-shadow-[0_0_8px_rgba(164,255,185,0.4)]">GeoClash</span>
</div>
<div class="flex items-center gap-2">
<div class="h-[1px] w-8 bg-outline-variant/30"></div>
<span class="text-xs font-label uppercase tracking-[0.2em] text-on-surface-variant">Global Discovery Hub</span>
<div class="h-[1px] w-8 bg-outline-variant/30"></div>
</div>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Username/Email Field -->
<div class="space-y-2 group">
<label class="block text-sm font-label font-medium text-on-surface-variant group-focus-within:text-primary transition-colors duration-300" for="identifier">Username or Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">alternate_email</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary transition-all duration-300 outline-none" id="identifier" name="identifier" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2 group">
<div class="flex justify-between items-center">
<label class="block text-sm font-label font-medium text-on-surface-variant group-focus-within:text-primary transition-colors duration-300" for="password">Password</label>
<a class="text-xs font-label text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">lock</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary transition-all duration-300 outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-bold py-4 rounded-lg flex items-center justify-center gap-2 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 kinetic-glow group" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">login</span>
</button>
</div>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="flex-1 h-[1px] bg-outline-variant/20"></div>
<span class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant/50">or access as</span>
<div class="flex-1 h-[1px] bg-outline-variant/20"></div>
</div>
<!-- Alternative Actions -->
<div class="space-y-4">
<button class="w-full bg-surface-bright/40 border border-outline-variant/20 text-on-surface font-label font-semibold py-4 rounded-lg flex items-center justify-center gap-2 hover:bg-surface-bright/60 hover:border-primary/30 transition-all duration-300 group" type="button">
<span class="material-symbols-outlined text-xl group-hover:text-primary transition-colors">person_search</span>
<span>Guest Entry</span>
</button>
<p class="text-center text-sm font-label text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2 decoration-primary/30" href="#">Sign Up</a>
</p>
</div>
<!-- Cosmetic Data Points (Editorial Aesthetic) -->
<div class="absolute bottom-4 right-4 opacity-10 pointer-events-none hidden md:block">
<p class="text-[10px] font-headline text-on-surface-variant text-right">COORD_AUTH_TOKEN: 8821-X9</p>
<p class="text-[10px] font-headline text-on-surface-variant text-right">STATUS: READY_FOR_SYNC</p>
</div>
</div>
<!-- Footer Info -->
<div class="mt-8 text-center">
<p class="text-[10px] font-label text-on-surface-variant/40 tracking-[0.3em] uppercase">
                © 2024 GeoClash Intelligence Agency
            </p>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none overflow-hidden opacity-20">
<div class="absolute top-[10%] left-[5%] w-px h-32 bg-gradient-to-b from-transparent via-primary/40 to-transparent"></div>
<div class="absolute bottom-[20%] right-[10%] w-px h-48 bg-gradient-to-b from-transparent via-primary/40 to-transparent"></div>
<div class="absolute top-[30%] right-[15%] w-24 h-px bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</div>
</body></html>
