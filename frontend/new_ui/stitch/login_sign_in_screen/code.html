<!DOCTYPE html>

<html class="dark" lang="en"><head>

                      "on-secondary": "#4d5353",

                      "inverse-on-surface": "#545555",
                      "secondary-fixed": "#dee4e3",
                      "on-tertiary-fixed-variant": "#005361",
                      "surface-tint": "#a4ffb9",
                      "inverse-surface": "#f9f9f9",
                      "surface-bright": "#2a2d2d",
                      "surface-container-low": "#121414",
                      "on-secondary-container": "#ccd1d1",
                      "error": "#ff716c",
                      "inverse-primary": "#006e37",
                      "primary-container": "#00fd87",
                      "tertiary-fixed-dim": "#00cdec",
                      "on-secondary-fixed": "#3a4040",
                      "secondary-fixed-dim": "#d0d6d5"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "fontFamily": {
                      "headline": ["Space Grotesk"],
                      "body": ["Inter"],
                      "label": ["Inter"]

          },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tech-grid {
            background-image: 
                linear-gradient(to right, rgba(164, 255, 185, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(164, 255, 185, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glass-edge {
            border-top: 1px solid rgba(170, 171, 171, 0.2);
            border-left: 1px solid rgba(170, 171, 171, 0.2);
        }
        .glow-hover:hover {
            box-shadow: 0 0 20px rgba(164, 255, 185, 0.4);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary min-h-screen flex items-center justify-center overflow-x-hidden py-12">
<!-- Background Layer -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-surface-dim"></div>
<div class="absolute inset-0 tech-grid"></div>
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-tertiary/5 blur-[120px]"></div>
<div class="absolute inset-0 opacity-20 bg-cover bg-center grayscale mix-blend-overlay" data-alt="abstract overhead cinematic drone shot of city lights at night with high contrast neon lines and dark shadows" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuALezi-lI-Ne7NbIsLdjYuKdKao9xtnQ6kcjmxoHmUI0WVToZCHWIwtwqZiv8NG2Y4AgEsOlZ4kJ8cSNLezugpWN-yG-MVq_QV9FhtQWQXjiXjD_LvTOanldjHp5CIDbQuusl1uXp_xkYfNeyEKYZPBPxqqs4d0lvDCCHcsPlxXTW-bFD_NosBIBhBJ3Ha3WA3jzM9o4H0zPZsJ8opYaC7Yi6NoBGGfEUUbN7OyUa_z3YKn7w_0uPUQwTw2Nk-O1JVvFZ2Ty_zDFdI');">
</div>
<div class="absolute inset-0 bg-surface/80 backdrop-blur-sm"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[480px] px-6">
<div class="bg-surface-variant/40 backdrop-blur-2xl rounded-xl glass-edge p-8 md:p-12 shadow-[0_40px_100px_rgba(0,0,0,0.6)] border border-primary/10">
<!-- Branding -->
<div class="flex flex-col items-center mb-10">
<div class="mb-4">
<span class="material-symbols-outlined text-primary text-5xl drop-shadow-[0_0_12px_rgba(164,255,185,0.6)]" data-icon="explore">explore</span>
</div>
<h1 class="font-headline text-4xl font-bold tracking-tighter text-primary drop-shadow-[0_0_8px_rgba(164,255,185,0.4)]">
                    GeoGuess
                </h1>
<p class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant mt-2">
                    Kinetic Explorer Protocol
                </p>
</div>
<!-- Primary Sign In Form -->
<section class="mb-10">
<h2 class="font-label text-[10px] uppercase tracking-[0.3em] text-on-surface-variant mb-6 flex items-center gap-4">
<span class="h-px grow bg-outline-variant/30"></span>
                    Portal Access
<span class="h-px grow bg-outline-variant/30"></span>
</h2>
<form class="space-y-5" onsubmit="return false;">
<div class="space-y-1.5 group">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant transition-all duration-300 group-focus-within:text-primary" for="email">
                            Identity / Email
                        </label>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border border-outline-variant/20 rounded-md px-4 py-3 text-on-surface placeholder:text-outline-variant/50 font-body focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300 outline-none" id="email" name="email" placeholder="explorer@kinetic.net" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-20 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm" data-icon="person">person</span>
</div>
</div>
</div>
<div class="space-y-1.5 group">
<div class="flex justify-between items-center">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant transition-all duration-300 group-focus-within:text-primary" for="password">
                                Security Key
                            </label>
<a class="font-label text-[9px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border border-outline-variant/20 rounded-md px-4 py-3 text-on-surface placeholder:text-outline-variant/50 font-body focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300 outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-20 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm" data-icon="key">key</span>
</div>
</div>
</div>
<button class="w-full group relative overflow-hidden bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold uppercase tracking-widest py-3.5 rounded-md transition-all duration-300 hover:scale-[1.01] active:scale-95 glow-hover shadow-lg shadow-primary/20" type="submit">
<span class="relative z-10 flex items-center justify-center gap-2">
                            Sign In
                            <span class="material-symbols-outlined text-sm font-bold" data-icon="login">login</span>
</span>
</button>
</form>
</section>
<!-- Secondary Entry (Connect) -->
<section>
<h2 class="font-label text-[10px] uppercase tracking-[0.3em] text-on-surface-variant mb-6 flex items-center gap-4">
<span class="h-px grow bg-outline-variant/30"></span>
                    Direct Entry
<span class="h-px grow bg-outline-variant/30"></span>
</h2>
<form class="space-y-4" onsubmit="return false;">
<div class="relative group">
<input class="w-full bg-surface-container-low border border-outline-variant/10 rounded-md px-4 py-3 text-on-surface placeholder:text-outline-variant/40 font-headline tracking-widest text-sm focus:border-primary/40 transition-all duration-300 outline-none" id="player-id" name="player-id" placeholder="EXPLORER_01" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-10 group-focus-within:opacity-30">
<span class="material-symbols-outlined text-sm" data-icon="fingerprint">fingerprint</span>
</div>
</div>
<button class="w-full group py-3 rounded-md border border-primary/20 text-primary font-label text-[11px] uppercase tracking-widest hover:bg-primary/5 transition-all duration-300 flex items-center justify-center gap-2" type="submit">
                        Connect As Guest
                        <span class="material-symbols-outlined text-xs" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</section>
<!-- Footer Links -->
<div class="mt-12 flex items-center justify-between">
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors duration-300 flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-xs" data-icon="help_outline">help_outline</span>
                    Support
                </a>
<div class="h-px w-8 bg-outline-variant/30"></div>
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors duration-300 flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-xs" data-icon="shield">shield</span>
                    Protocol
                </a>
</div>
</div>
<!-- System Status Bar -->
<div class="mt-8 flex justify-center gap-6 opacity-40">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="font-label text-[10px] uppercase tracking-tighter">Server: Online</span>
</div>
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-tertiary"></div>
<span class="font-label text-[10px] uppercase tracking-tighter">Latency: 24ms</span>
</div>
</div>
</main>
<!-- Corner Decorative Elements -->
<div class="fixed top-8 left-8 z-20 pointer-events-none hidden md:block">
<div class="font-headline text-primary/30 text-6xl opacity-20 font-bold leading-none">01</div>
<div class="h-px w-24 bg-primary/20 mt-2"></div>
</div>
<div class="fixed bottom-8 right-8 z-20 pointer-events-none hidden md:block text-right">
<div class="font-label text-on-surface-variant/40 text-[10px] uppercase tracking-[0.3em]">System.v4.02.1</div>
<div class="font-label text-on-surface-variant/40 text-[10px] uppercase tracking-[0.3em] mt-1">Geospatial_Node_Active</div>
</div>
</body></html>
